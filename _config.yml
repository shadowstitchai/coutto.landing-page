title_en                                   : Coutto Pattern - Project, Cut, Stitch, Print and Store Patterns
description_en                             : Cut fabric with projector, stitch, print, and store sewing patterns - all in one app. Digital precision calibration projects patterns at actual size onto fabric for direct cutting.

# FAQ (Chinese)
faq                                       :
  - question                              : 我们支持什么设备？
    answer                                :
      - 纽扣纸样支持 iPhone、iPad，以及 Android 手机与平板电脑。
      - 进行投影仪校准与面料裁切时，建议使用屏幕更大的 iPad 或 Android 平板，操作更清晰、视野更好。

  - question                              : 需要什么系统版本？
    answer                                :
      - iOS 设备需 iOS 17 或更高版本；Android 设备需 Android 8.0（API 26）或更高版本。
      - 请保持系统与 App 为较新版本，以获得最佳体验与兼容性。

  - question                              : 裁切面料推荐什么投影仪？
    answer                                :
      - 建议选用至少 720p 分辨率、支持将手机画面镜像到投影仪的机型（可使用投影仪自带投屏/镜像软件，或系统无线投屏）。
      - 将手机镜像到投影仪后，在 App 内完成校准，即可按 1:1 尺寸投影纸样并沿投影线裁切面料。
      - 每次开启或移动投影仪后请重新校准。建议准备切割垫与卷尺；带英寸/厘米网格的裁切垫有助于提高校准精度。
      - 更多选购与布置建议，可参考 App 内「如何选择缝纫投影仪」教程。

  - question                              : 支持哪些纸样格式？
    answer                                :
      - 可导入与管理 PDF、SVG、DXF、PLT、PNG、JPEG、WebP 等常见纸样文件。
      - DXF、PLT、SVG 与 PDF 已经带有实际尺寸，可直接投影与打印。
      - PNG、JPEG、WebP 图片格式纸样，可通过标定功能设置实际尺寸后再投影裁切或者打印。

  - question                              : 投影仪裁切前需要做什么准备？
    answer                                :
      - 请准备投影仪、切割垫、卷尺与已安装纽扣纸样的手机或平板。
      - 使用投屏软件将手机镜像到投影仪后，在 App 中完成校准；若使用图片类纸样，请先通过标定功能设置实际尺寸。
      - 移动或重新开启投影仪，或更改长度单位后，请再次校准以确保投影尺寸准确。

  - question                              : 哪些纸样格式支持 A3/A4 分片打印？
    answer                                :
      - 支持 PDF、SVG、DXF、PLT、PNG、JPEG、WebP 等常见纸样文件的 A3/A4 分片打印。
      - 图片格式 PNG、JPEG、WebP 纸样在通过标定功能设置实际尺寸后再打印。

# FAQ (English)
faq_en                                    :
  - question                              : What devices are supported?
    answer                                :
      - Coutto Pattern runs on iPhone, iPad, and Android phones and tablets.
      - For projector calibration and fabric cutting, we recommend a larger screen such as an iPad or Android tablet for a clearer view and easier controls.

  - question                              : What OS versions are required?
    answer                                :
      - iOS 17 or later on iPhone and iPad; Android 8.0 (API 26) or later on Android devices.
      - Keep your system and the app up to date for the best experience and compatibility.

  - question                              : Which projector do you recommend for cutting fabric?
    answer                                :
      - Choose a projector with at least 720p resolution that can mirror your phone screen (built-in casting/mirroring apps or system wireless display).
      - Mirror your phone to the projector, then calibrate in the app to project patterns at true size and cut along the projected lines.
      - Recalibrate whenever you turn on or move the projector. A cutting mat and tape measure are recommended; a grid mat helps improve calibration accuracy.
      - See the in-app “Choose Your Sewing Projector” tutorial for more setup tips.

  - question                              : Which pattern file formats are supported?
    answer                                :
      - You can import and manage PDF, SVG, DXF, PLT, PNG, JPEG, WebP, and other common pattern files.
      - DXF, PLT, SVG, and PDF already include real-world dimensions and can be projected or printed directly.
      - PNG, JPEG, and WebP image patterns can be calibrated to actual size before projector cutting or printing.

  - question                              : How do I prepare for projector cutting?
    answer                                :
      - You will need a projector, cutting mat, tape measure, and a phone or tablet with Coutto Pattern installed.
      - Mirror your phone to the projector with casting software, then calibrate in the app; for raster pattern images, set the real-world size first.
      - Recalibrate after moving the projector or changing length units so the projection stays accurate.

  - question                              : Which pattern formats support tiled A4/A3 printing?
    answer                                :
      - PDF, SVG, DXF, PLT, PNG, JPEG, WebP, and other common pattern files support tiled A4/A3 printing.
      - For PNG, JPEG, and WebP image patterns, set the actual size with the calibration tools before printing.



